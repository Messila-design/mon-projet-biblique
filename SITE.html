<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Centre de Formation Laméd</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
  :root{
    --ink:#1B2036;
    --ink-soft:#2A3155;
    --ink-line:#3B4272;
    --parchment:#FFFFFF;
    --parchment-dark:#E4E4E4;
    --parchment-card:#FFFFFF;
    --gold:#B4903F;
    --gold-light:#D9B876;
    --burgundy:#7C2E2E;
    --burgundy-dark:#5E2222;
    --text-dark:#26201A;
    --text-soft:#5B5142;
    --text-onink:#EFE7D2;
    --text-onink-soft:#B8B3D6;
    --font-display:'Lora', Georgia, serif;
    --font-body:'Lora', Georgia, serif;
    --font-mono:'Space Mono', monospace;
    --radius:2px;
    --shadow-card: 0 1px 2px rgba(27,32,54,0.08), 0 6px 20px rgba(27,32,54,0.06);
  }

  *{ box-sizing:border-box; }
  html{ scroll-behavior:smooth; }
  body{
    margin:0;
    background:var(--parchment);
    color:var(--text-dark);
    font-family:var(--font-body);
    line-height:1.55;
  }
  h1,h2,h3,h4{
    font-family:var(--font-display);
    margin:0 0 .4em 0;
    font-weight:700;
    letter-spacing:.01em;
  }
  a{ color:inherit; }
  button{ font-family:var(--font-body); cursor:pointer; }
  .lamed{ font-family:var(--font-display); font-weight:900; }

  /* ============ EN-TÊTE / NAVIGATION ============ */
  header.site-header{
    position:sticky; top:0; z-index:50;
    background:var(--ink);
    border-bottom:1px solid var(--ink-line);
  }
  .header-inner{
    max-width:1180px; margin:0 auto;
    display:flex; align-items:center; gap:24px;
    padding:14px 24px;
    flex-wrap:wrap;
  }
  .brand{
    display:flex; align-items:center; gap:12px;
    color:var(--text-onink);
    text-decoration:none;
    flex-shrink:0;
  }
  .brand-mark{
    width:38px; height:38px;
    border:1px solid var(--gold);
    display:flex; align-items:center; justify-content:center;
    font-size:20px; color:var(--gold-light);
    flex-shrink:0;
  }
  .brand-text{ line-height:1.15; }
  .brand-text .name{ font-family:var(--font-display); font-size:17px; font-weight:700; }
  .brand-text .sub{ font-family:var(--font-mono); font-size:10px; letter-spacing:.12em; color:var(--gold-light); text-transform:uppercase; }

  nav.tabs{
    display:flex; gap:4px; margin-left:8px;
    flex-wrap:wrap;
  }
  nav.tabs button{
    background:none; border:none;
    color:var(--text-onink-soft);
    font-size:14.5px; font-weight:600;
    padding:10px 14px;
    border-bottom:2px solid transparent;
    transition:.15s;
  }
  nav.tabs button:hover{ color:var(--text-onink); }
  nav.tabs button.active{
    color:var(--gold-light);
    border-bottom-color:var(--gold);
  }

  .search-wrap{
    margin-left:auto;
    display:flex; align-items:center;
    background:var(--ink-soft);
    border:1px solid var(--ink-line);
    padding:0 6px 0 12px;
    min-width:230px;
    flex:1 1 230px; max-width:340px;
  }
  .search-wrap input{
    background:none; border:none; outline:none;
    color:var(--text-onink);
    font-family:var(--font-body);
    font-size:14px;
    padding:9px 6px;
    width:100%;
  }
  .search-wrap input::placeholder{ color:#8B87AE; }
  .search-wrap button{
    background:none; border:none; color:var(--gold-light);
    padding:8px; display:flex; align-items:center;
  }

  /* ============ OPTIONS DE LECTURE ============ */
  .lecture-wrap{ position:relative; flex-shrink:0; }
  #btn-lecture{
    background:none; border:1px solid var(--ink-line);
    color:var(--text-onink); font-family:var(--font-display); font-weight:700;
    font-size:14px; padding:9px 13px;
  }
  #btn-lecture:hover{ border-color:var(--gold); color:var(--gold-light); }
  .panel-lecture{
    display:none; position:absolute; top:calc(100% + 8px); right:0;
    background:var(--ink-soft); border:1px solid var(--ink-line);
    padding:16px; width:230px; z-index:60;
    box-shadow:0 10px 28px rgba(0,0,0,.35);
  }
  .panel-lecture.ouvert{ display:block; }
  .lecture-groupe{ margin-bottom:16px; }
  .lecture-groupe:last-child{ margin-bottom:0; }
  .lecture-label{
    display:block; font-family:var(--font-mono); font-size:10px;
    letter-spacing:.08em; text-transform:uppercase; color:var(--gold-light);
    margin-bottom:8px;
  }
  .lecture-taille-ctrl{ display:flex; align-items:center; gap:10px; }
  .lecture-taille-ctrl button{
    background:none; border:1px solid var(--ink-line); color:var(--text-onink);
    width:32px; height:32px; font-weight:700; font-size:13px;
  }
  .lecture-taille-ctrl button:hover{ border-color:var(--gold); color:var(--gold-light); }
  .lecture-taille-ctrl span{
    font-family:var(--font-mono); font-size:12px; color:var(--text-onink-soft);
    min-width:38px; text-align:center;
  }
  .lecture-modes{ display:flex; gap:6px; }
  .lecture-modes button{
    flex:1; background:none; border:1px solid var(--ink-line);
    color:var(--text-onink-soft); font-size:11px; padding:7px 4px;
  }
  .lecture-modes button:hover{ border-color:var(--gold); }
  .lecture-modes button.active{
    background:var(--gold); border-color:var(--gold); color:var(--ink); font-weight:700;
  }
  #select-police{
    width:100%; background:var(--ink); border:1px solid var(--ink-line);
    color:var(--text-onink); padding:8px; font-family:var(--font-body); font-size:13px;
  }

  body.mode-sepia{
    --parchment:#F4ECD8;
    --parchment-dark:#E3D5B8;
    --parchment-card:#FBF3E1;
    --text-dark:#4B3621;
    --text-soft:#7A6142;
  }
  body.mode-nuit{
    --parchment:#14161C;
    --parchment-dark:#2A2E38;
    --parchment-card:#1C1F27;
    --text-dark:#E8E6DF;
    --text-soft:#A8A396;
  }

  /* ============ HERO ============ */
  .hero{
    position:relative; overflow:hidden;
    background:var(--ink);
    color:var(--text-onink);
    padding:88px 24px 76px;
    text-align:center;
  }
  .hero::before{
    content:"ל";
    position:absolute; top:50%; left:50%;
    transform:translate(-50%,-46%);
    font-family:var(--font-display);
    font-weight:900;
    font-size:min(60vw, 620px);
    line-height:1;
    color:var(--gold);
    opacity:.07;
    pointer-events:none;
    user-select:none;
  }
  .hero-inner{ position:relative; max-width:760px; margin:0 auto; }
  .hero .eyebrow{
    font-family:var(--font-mono); font-size:11px; letter-spacing:.22em;
    text-transform:uppercase; color:var(--gold-light); margin-bottom:18px;
  }
  .hero h1{
    font-size:clamp(32px, 5vw, 52px);
    color:#fff;
    margin-bottom:16px;
  }
  .hero p.tagline{
    font-size:17px; color:var(--text-onink-soft);
    max-width:560px; margin:0 auto;
  }

  /* ============ SECTIONS GÉNÉRIQUES ============ */
  main{ max-width:1180px; margin:0 auto; padding:0 24px; }
  section.panel{ display:none; padding:56px 0; }
  section.panel.active{ display:block; }

  .section-head{
    display:flex; align-items:baseline; gap:14px;
    margin-bottom:28px;
    border-bottom:1px solid var(--parchment-dark);
    padding-bottom:16px;
  }
  .section-head .glyph{ color:var(--gold); font-size:22px; }
  .section-head h2{ font-size:26px; color:var(--text-dark); }
  .section-head p{ margin:2px 0 0; color:var(--text-soft); font-size:14.5px; }

  /* ============ GRILLE PDF ============ */
  .pdf-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(270px, 1fr));
    gap:18px;
  }
  .pdf-card{
    background:var(--parchment-card);
    border:1px solid var(--parchment-dark);
    border-left:3px solid var(--gold);
    box-shadow:var(--shadow-card);
    display:flex; flex-direction:column;
    overflow:hidden;
  }
  .doc-thumb-wrap{
    width:100%; aspect-ratio:4/3;
    background:var(--parchment-dark);
    overflow:hidden;
  }
  .doc-thumb-wrap a{ display:block; width:100%; height:100%; }
  .doc-thumb-wrap img{ width:100%; height:100%; object-fit:cover; display:block; }
  .doc-body{
    padding:20px;
    display:flex; flex-direction:column; gap:10px;
  }
  .pdf-card .doc-title{ font-family:var(--font-display); font-size:17px; font-weight:700; }
  .pdf-card .doc-desc{ font-size:14px; color:var(--text-soft); flex-grow:1; }
  .pdf-card .doc-tags{ display:flex; flex-wrap:wrap; gap:6px; }
  .tag{
    font-family:var(--font-mono); font-size:10px; letter-spacing:.04em;
    background:var(--parchment-dark); color:var(--text-soft);
    padding:3px 8px;
  }
  .pdf-card .doc-meta{ font-family:var(--font-mono); font-size:11px; color:#8A7F63; }
  .doc-date-pub{
    font-family:var(--font-mono); font-size:11px; color:#8A7F63;
    border-top:1px solid var(--parchment-dark); padding-top:10px; margin-top:2px;
  }
  .doc-actions{ display:flex; gap:8px; margin-top:6px; }
  .badge-new{
    align-self:flex-start;
    font-family:var(--font-mono); font-size:10px; letter-spacing:.08em; text-transform:uppercase;
    background:var(--burgundy); color:#fff;
    padding:3px 9px;
  }
  .doc-reactions{
    display:flex; gap:8px; margin-top:2px;
    border-top:1px solid var(--parchment-dark); padding-top:12px;
  }
  .reaction-btn{
    display:inline-flex; align-items:center; gap:6px;
    background:none; border:1px solid var(--parchment-dark);
    padding:6px 11px; font-size:12.5px; color:var(--text-soft);
    font-family:var(--font-mono);
    transition:.15s;
  }
  .reaction-btn:hover{ border-color:var(--gold); color:var(--text-dark); }
  .reaction-btn.active{ background:var(--ink); border-color:var(--ink); color:var(--gold-light); }
  .categorie-bloc{ margin-bottom:44px; }
  .categorie-titre{
    font-size:19px; color:var(--burgundy);
    border-bottom:2px solid var(--gold);
    display:inline-block; padding-bottom:4px; margin-bottom:18px;
  }
  .btn{
    display:inline-flex; align-items:center; gap:6px;
    font-size:13px; font-weight:600;
    padding:9px 14px;
    border:1px solid transparent;
    text-decoration:none;
    transition:.15s;
  }
  .btn-primary{ background:var(--burgundy); color:#fff; }
  .btn-primary:hover{ background:var(--burgundy-dark); }
  .btn-ghost{ border-color:var(--gold); color:var(--burgundy); background:none; }
  .btn-ghost:hover{ background:var(--parchment-dark); }
  .empty-note{
    padding:30px; text-align:center; color:var(--text-soft);
    border:1px dashed var(--parchment-dark); font-size:14px;
  }

  /* ============ VIDÉOS ============ */
  .video-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));
    gap:18px;
  }
  .video-card{ background:var(--ink); }
  .video-card .frame-wrap{ position:relative; width:100%; padding-top:56.25%; }
  .video-card iframe{ position:absolute; inset:0; width:100%; height:100%; border:0; }
  .video-card .video-title{
    color:var(--text-onink); font-size:13.5px; font-weight:600;
    padding:12px 14px; font-family:var(--font-body);
  }

  /* ============ ÉTUDES BIBLIQUES ============ */
  .etude{
    background:var(--parchment-card);
    border:1px solid var(--parchment-dark);
    padding:28px 30px;
    margin-bottom:22px;
  }
  .etude .etude-date{ font-family:var(--font-mono); font-size:11px; color:var(--gold); text-transform:uppercase; letter-spacing:.08em; }
  .etude .etude-entete{ display:flex; align-items:center; gap:12px; margin-bottom:2px; }
  .etude .doc-reactions{ margin-top:20px; }
  .etude h3{ font-size:21px; margin:6px 0 14px; }
  .etude .etude-corps{ font-size:15.5px; color:var(--text-dark); }
  .etude .etude-corps p{ margin:0 0 1em; }
  .etude .etude-corps h4{
    font-size:16.5px; color:var(--burgundy); margin:1.6em 0 .6em;
  }
  .etude .etude-corps blockquote{
    margin:0 0 1em; padding:10px 16px;
    border-left:3px solid var(--gold);
    background:var(--parchment);
    font-style:italic;
  }
  .etude .etude-corps blockquote p{ margin:0 0 .3em; }
  .etude .etude-corps cite{
    display:block; font-style:normal; font-family:var(--font-mono);
    font-size:11px; color:var(--text-soft); margin-top:4px;
  }

  .annonce-etude{
    display:block; text-decoration:none; color:inherit;
    background:var(--ink); border-left:3px solid var(--gold);
    padding:18px 22px; margin-bottom:48px;
    display:flex; align-items:center; gap:16px; flex-wrap:wrap;
    cursor:pointer;
